version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next:
        patterns: ["next", "react", "react-dom", "@types/react*"]
      sanity:
        patterns: ["@sanity/*", "sanity"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "prettier-plugin-tailwindcss"]
  - package-ecosystem: npm
    directory: "/studio"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
